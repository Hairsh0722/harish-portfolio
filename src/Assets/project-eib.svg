<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="Employee Information Bank — app preview">
  <defs>
    <linearGradient id="eibBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0b18"/>
      <stop offset="1" stop-color="#141026"/>
    </linearGradient>
    <radialGradient id="eibGlowP" cx="0.12" cy="0.05" r="0.85">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eibGlowC" cx="0.95" cy="1.05" r="0.95">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="eibAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="eibAvatar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="640" height="360" fill="url(#eibBg)"/>
  <rect width="640" height="360" fill="url(#eibGlowP)"/>
  <rect width="640" height="360" fill="url(#eibGlowC)"/>

  <!-- app window -->
  <g>
    <rect x="52" y="58" width="536" height="244" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="52" y="58" width="536" height="4" rx="2" fill="url(#eibAccent)"/>

    <!-- title bar -->
    <circle cx="76" cy="86" r="4.5" fill="#ff5f57" fill-opacity="0.85"/>
    <circle cx="92" cy="86" r="4.5" fill="#febc2e" fill-opacity="0.85"/>
    <circle cx="108" cy="86" r="4.5" fill="#28c840" fill-opacity="0.85"/>
    <rect x="240" y="79" width="160" height="14" rx="7" fill="#ffffff" fill-opacity="0.08"/>
    <text x="320" y="90" text-anchor="middle" font-family="'Segoe UI',Inter,system-ui,sans-serif" font-size="9" letter-spacing="1.5" fill="#ffffff" fill-opacity="0.55">EMPLOYEE INFORMATION BANK</text>

    <!-- sidebar -->
    <rect x="52" y="104" width="120" height="198" fill="#ffffff" fill-opacity="0.03"/>
    <rect x="72" y="124" width="80" height="9" rx="4.5" fill="url(#eibAccent)" fill-opacity="0.9"/>
    <rect x="72" y="148" width="64" height="7" rx="3.5" fill="#ffffff" fill-opacity="0.22"/>
    <rect x="72" y="168" width="72" height="7" rx="3.5" fill="#ffffff" fill-opacity="0.22"/>
    <rect x="72" y="188" width="56" height="7" rx="3.5" fill="#ffffff" fill-opacity="0.22"/>

    <!-- directory list -->
    <g>
      <circle cx="204" cy="132" r="12" fill="url(#eibAvatar)"/>
      <rect x="226" y="124" width="120" height="8" rx="4" fill="#ffffff" fill-opacity="0.5"/>
      <rect x="226" y="138" width="72" height="6" rx="3" fill="#ffffff" fill-opacity="0.22"/>
    </g>
    <g>
      <circle cx="204" cy="170" r="12" fill="url(#eibAvatar)"/>
      <rect x="226" y="162" width="140" height="8" rx="4" fill="#ffffff" fill-opacity="0.5"/>
      <rect x="226" y="176" width="60" height="6" rx="3" fill="#ffffff" fill-opacity="0.22"/>
    </g>

    <!-- module tiles -->
    <g>
      <!-- transport -->
      <rect x="392" y="120" width="172" height="52" rx="10" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
      <g transform="translate(408,132)" stroke="#c084fc" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="0" y="2" width="24" height="18" rx="3"/>
        <line x1="0" y1="9" x2="24" y2="9"/>
        <circle cx="6" cy="22" r="2.4" fill="#c084fc" stroke="none"/>
        <circle cx="18" cy="22" r="2.4" fill="#c084fc" stroke="none"/>
      </g>
      <rect x="444" y="132" width="100" height="8" rx="4" fill="#ffffff" fill-opacity="0.42"/>
      <rect x="444" y="148" width="66" height="6" rx="3" fill="#ffffff" fill-opacity="0.2"/>

      <!-- exit process -->
      <rect x="392" y="182" width="172" height="52" rx="10" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
      <g transform="translate(408,194)" stroke="#38bdf8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 2 H4 a2 2 0 0 0 -2 2 v16 a2 2 0 0 0 2 2 h9"/>
        <line x1="10" y1="12" x2="24" y2="12"/>
        <polyline points="19,7 24,12 19,17"/>
      </g>
      <rect x="444" y="194" width="90" height="8" rx="4" fill="#ffffff" fill-opacity="0.42"/>
      <rect x="444" y="210" width="60" height="6" rx="3" fill="#ffffff" fill-opacity="0.2"/>

      <!-- directory -->
      <rect x="392" y="244" width="172" height="46" rx="10" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
      <g transform="translate(408,254)" stroke="#c084fc" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="8" cy="6" r="4"/>
        <path d="M2 20 a6 6 0 0 1 12 0"/>
        <circle cx="19" cy="8" r="3"/>
        <path d="M15 20 a5 5 0 0 1 9 -3"/>
      </g>
      <rect x="444" y="258" width="104" height="8" rx="4" fill="#ffffff" fill-opacity="0.42"/>
      <rect x="444" y="273" width="70" height="6" rx="3" fill="#ffffff" fill-opacity="0.2"/>
    </g>
  </g>

  <!-- wordmark badge -->
  <g transform="translate(28,300)">
    <rect x="0" y="0" width="66" height="30" rx="8" fill="url(#eibAccent)"/>
    <text x="33" y="21" text-anchor="middle" font-family="'Segoe UI',Inter,system-ui,sans-serif" font-weight="700" font-size="17" letter-spacing="1" fill="#0d0b18">EIB</text>
  </g>
</svg>
